<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Tetris — Peña el Revuelto</title>
  <meta name="theme-color" content="#0047ab" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --azul: #0047ab; }
    body { min-height: 100dvh; font-family: system-ui, sans-serif; background: #0a0a1a; color: #fff; display: flex; flex-direction: column; }
    .contenido { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 16px 16px 40px; gap: 12px; }
    .marcador { display: flex; gap: 32px; }
    .marcador-item { text-align: center; }
    .marcador-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .08em; color: rgba(255,255,255,.4); }
    .marcador-valor { font-size: 1.6rem; font-weight: 900; font-variant-numeric: tabular-nums; }
    .juego-wrap { display: flex; gap: 12px; align-items: flex-start; }
    .canvas-wrap { position: relative; border: 2px solid var(--azul); border-radius: 12px; overflow: hidden; box-shadow: 0 0 40px rgba(0,71,171,.4); }
    #canvas { display: block; background: #0d1117; }
    .lateral { display: flex; flex-direction: column; gap: 12px; }
    .next-box { background: #1a1a2e; border: 1px solid rgba(255,255,255,.08); border-radius: 10px; padding: 10px; }
    .next-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .08em; color: rgba(255,255,255,.4); margin-bottom: 6px; text-align: center; }
    #next-canvas { display: block; }
    .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; background: rgba(10,10,26,.9); backdrop-filter: blur(4px); }
    .overlay.oculto { display: none; }
    .overlay-titulo { font-size: 1.8rem; font-weight: 900; }
    .overlay-sub { font-size: .9rem; color: rgba(255,255,255,.5); text-align: center; padding: 0 20px; }
    .btn-jugar { background: var(--azul); color: #fff; border: none; border-radius: 10px; padding: 12px 28px; font-size: 1rem; font-weight: 700; cursor: pointer; }
    .btn-jugar:hover { opacity: .85; }
    .dpad { display: grid; grid-template-areas: ". up ." "left down right"; grid-template-columns: repeat(3, 52px); grid-template-rows: repeat(2, 52px); gap: 4px; }
    .dpad button { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); border-radius: 10px; color: #fff; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
    .dpad button:active { background: var(--azul); }
    .dpad .up    { grid-area: up; }
    .dpad .left  { grid-area: left; }
    .dpad .down  { grid-area: down; }
    .dpad .right { grid-area: right; }
    @media (min-width: 500px) { .dpad { display: none; } }
  </style>
</head>
<body>
  <script src="nav.js"></script>
  <div class="contenido">
    <div class="marcador">
      <div class="marcador-item"><div class="marcador-label">Puntos</div><div class="marcador-valor" id="score-val">0</div></div>
      <div class="marcador-item"><div class="marcador-label">Nivel</div><div class="marcador-valor" id="nivel-val">1</div></div>
      <div class="marcador-item"><div class="marcador-label">Líneas</div><div class="marcador-valor" id="lineas-val">0</div></div>
    </div>

    <div class="juego-wrap">
      <div class="canvas-wrap">
        <canvas id="canvas"></canvas>
        <div class="overlay" id="overlay">
          <div class="overlay-titulo">🟦 Tetris</div>
          <div class="overlay-sub">← → mover · ↑ rotar · ↓ bajar</div>
          <button class="btn-jugar" onclick="iniciar()">Jugar</button>
        </div>
      </div>
      <div class="lateral">
        <div class="next-box">
          <div class="next-label">Siguiente</div>
          <canvas id="next-canvas" width="80" height="80"></canvas>
        </div>
      </div>
    </div>

    <div class="dpad">
      <button class="up"    onclick="rotar()">↻</button>
      <button class="left"  onclick="mover(-1)">◀</button>
      <button class="down"  onclick="bajar()">▼</button>
      <button class="right" onclick="mover(1)">▶</button>
    </div>
  </div>

  <script>
    const COLS = 10, ROWS = 20, CELL = 28;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = COLS * CELL; canvas.height = ROWS * CELL;

    const nctx = document.getElementById('next-canvas').getContext('2d');

    const COLORS = ['','#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c'];
    const PIECES = [
      null,
      [[1,1,1,1]],
      [[2,2],[2,2]],
      [[0,3,0],[3,3,3]],
      [[4,0,0],[4,4,4]],
      [[0,0,5],[5,5,5]],
      [[6,6,0],[0,6,6]],
      [[0,7,7],[7,7,0]],
    ];

    let board, cur, curX, curY, next, score, nivel, lineas, running, dropTimer, dropInterval;

    function newBoard() { return Array.from({length:ROWS}, () => Array(COLS).fill(0)); }

    function randPiece() { return Math.floor(Math.random()*7)+1; }

    function iniciar() {
      board = newBoard(); score = 0; nivel = 1; lineas = 0;
      document.getElementById('score-val').textContent  = '0';
      document.getElementById('nivel-val').textContent  = '1';
      document.getElementById('lineas-val').textContent = '0';
      document.getElementById('overlay').classList.add('oculto');
      next = randPiece();
      spawnPiece();
      running = true;
      clearInterval(dropTimer);
      dropInterval = 800;
      dropTimer = setInterval(tick, dropInterval);
    }

    function spawnPiece() {
      cur  = PIECES[next];
      curX = Math.floor((COLS - cur[0].length) / 2);
      curY = 0;
      next = randPiece();
      drawNext();
      if (colide(cur, curX, curY)) gameOver();
    }

    function colide(p, ox, oy) {
      for (let r=0;r<p.length;r++) for (let c=0;c<p[r].length;c++) {
        if (!p[r][c]) continue;
        const nx=ox+c, ny=oy+r;
        if (nx<0||nx>=COLS||ny>=ROWS) return true;
        if (ny>=0 && board[ny][nx]) return true;
      }
      return false;
    }

    function merge() {
      cur.forEach((row,r)=>row.forEach((v,c)=>{ if(v) board[curY+r][curX+c]=v; }));
    }

    function clearLines() {
      let cleared = 0;
      for (let r=ROWS-1;r>=0;r--) {
        if (board[r].every(v=>v)) { board.splice(r,1); board.unshift(Array(COLS).fill(0)); cleared++; r++; }
      }
      if (!cleared) return;
      lineas += cleared;
      const pts = [0,100,300,500,800][cleared] * nivel;
      score += pts;
      nivel = Math.floor(lineas/10)+1;
      dropInterval = Math.max(100, 800 - (nivel-1)*70);
      clearInterval(dropTimer); dropTimer = setInterval(tick, dropInterval);
      document.getElementById('score-val').textContent  = score;
      document.getElementById('nivel-val').textContent  = nivel;
      document.getElementById('lineas-val').textContent = lineas;
    }

    function tick() {
      if (!running) return;
      curY++;
      if (colide(cur, curX, curY)) { curY--; merge(); clearLines(); spawnPiece(); }
      draw();
    }

    function mover(d) {
      if (!running) return;
      if (!colide(cur, curX+d, curY)) curX+=d;
      draw();
    }

    function bajar() {
      if (!running) return;
      while (!colide(cur, curX, curY+1)) curY++;
      tick();
    }

    function rotar() {
      if (!running) return;
      const rot = cur[0].map((_,i)=>cur.map(r=>r[i]).reverse());
      if (!colide(rot, curX, curY)) cur = rot;
      draw();
    }

    function draw() {
      ctx.fillStyle = '#0d1117'; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.strokeStyle = 'rgba(255,255,255,.03)'; ctx.lineWidth = 0.5;
      for (let x=0;x<=COLS;x++) { ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,canvas.height);ctx.stroke(); }
      for (let y=0;y<=ROWS;y++) { ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(canvas.width,y*CELL);ctx.stroke(); }

      board.forEach((row,r)=>row.forEach((v,c)=>{ if(v) drawCell(ctx,c,r,COLORS[v],CELL); }));

      if (cur) {
        let ghost = curY;
        while (!colide(cur, curX, ghost+1)) ghost++;
        cur.forEach((row,r)=>row.forEach((v,c)=>{ if(v) drawCell(ctx,curX+c,ghost+r,'rgba(255,255,255,.12)',CELL); }));
        cur.forEach((row,r)=>row.forEach((v,c)=>{ if(v) drawCell(ctx,curX+c,curY+r,COLORS[v],CELL); }));
      }
    }

    function drawCell(c, x, y, color, sz) {
      c.fillStyle = color;
      c.beginPath(); c.roundRect(x*sz+1, y*sz+1, sz-2, sz-2, 3); c.fill();
    }

    function drawNext() {
      nctx.fillStyle = '#0d1117'; nctx.fillRect(0,0,80,80);
      const p = PIECES[next], sz = 16;
      const ox = Math.floor((5-p[0].length)/2), oy = Math.floor((5-p.length)/2);
      p.forEach((row,r)=>row.forEach((v,c)=>{ if(v) drawCell(nctx,ox+c,oy+r,COLORS[v],sz); }));
    }

    function gameOver() {
      running = false; clearInterval(dropTimer);
      const o = document.getElementById('overlay');
      o.innerHTML = `
        <div class="overlay-titulo">💀 Game Over</div>
        <div class="overlay-sub">Puntuación: ${score}<br>Líneas: ${lineas}</div>
        <button class="btn-jugar" onclick="iniciar()">Jugar de nuevo</button>`;
      o.classList.remove('oculto');
    }

    document.addEventListener('keydown', e => {
      switch(e.key) {
        case 'ArrowLeft':  e.preventDefault(); mover(-1); break;
        case 'ArrowRight': e.preventDefault(); mover(1);  break;
        case 'ArrowDown':  e.preventDefault(); bajar();   break;
        case 'ArrowUp':    e.preventDefault(); rotar();   break;
      }
    });

    let tx0, ty0;
    canvas.addEventListener('touchstart', e=>{ tx0=e.touches[0].clientX; ty0=e.touches[0].clientY; e.preventDefault(); },{passive:false});
    canvas.addEventListener('touchend', e=>{
      const dx=e.changedTouches[0].clientX-tx0, dy=e.changedTouches[0].clientY-ty0;
      if (Math.abs(dx)>Math.abs(dy)) mover(dx>0?1:-1);
      else if (dy>20) bajar(); else rotar();
    },{passive:false});

    ctx.fillStyle = '#0d1117'; ctx.fillRect(0,0,canvas.width,canvas.height);
  </script>
</body>
</html>
