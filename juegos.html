<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juegos — Peña el Revuelto</title>
  <meta name="theme-color" content="#0047ab" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --azul: #0047ab; }
    body { min-height: 100dvh; font-family: system-ui, -apple-system, sans-serif; background: #0a0a1a; color: #fff; }
    .contenido { max-width: 700px; margin: 0 auto; padding: 40px 16px 80px; }
    .page-title { font-size: clamp(1.5rem,4vw,2.2rem); font-weight: 900; margin-bottom: 8px; }
    .page-sub { color: rgba(255,255,255,.45); font-size: .9rem; margin-bottom: 36px; }
    .juegos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .juego-card { background: #1a1a2e; border: 1px solid rgba(255,255,255,.08); border-radius: 16px; padding: 28px 20px; text-decoration: none; color: #fff; text-align: center; transition: border-color .2s, background .2s; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .juego-card:hover { border-color: var(--azul); background: rgba(0,71,171,.12); }
    .juego-icono { font-size: 2.8rem; }
    .juego-nombre { font-size: 1.1rem; font-weight: 800; }
    .juego-desc { font-size: .8rem; color: rgba(255,255,255,.45); line-height: 1.4; }
  </style>
</head>
<body>
  <script src="nav.js"></script>
  <div class="contenido">
    <h1 class="page-title">Juegos</h1>
    <p class="page-sub">Echa una partida mientras esperas las fiestas</p>
    <div class="juegos-grid">
      <a href="snake.html" class="juego-card">
        <div class="juego-icono">🐍</div>
        <div class="juego-nombre">Snake</div>
        <div class="juego-desc">El clásico de Nokia. ¿Puedes batir el récord de la peña?</div>
      </a>
      <a href="pong.html" class="juego-card">
        <div class="juego-icono">🏓</div>
        <div class="juego-nombre">Pong</div>
        <div class="juego-desc">Tú contra la máquina. Primero en llegar a 7 gana.</div>
      </a>
      <a href="tetris.html" class="juego-card">
        <div class="juego-icono">🟦</div>
        <div class="juego-nombre">Tetris</div>
        <div class="juego-desc">Encaja las piezas antes de que lleguen arriba.</div>
      </a>
    </div>
  </div>
</body>
</html>
