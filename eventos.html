<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventos — Peña el Revuelto</title>
  <meta name="theme-color" content="#0047ab" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --azul: #0047ab; --radio: 14px; }
    body { min-height: 100dvh; font-family: system-ui, -apple-system, sans-serif; background: #0a0a1a; color: #fff; overflow-x: hidden; }

    .nav { position: sticky; top: 0; z-index: 100; background: var(--azul); box-shadow: 0 2px 20px rgba(0,0,0,.5); }
    .nav-inner { max-width: 1000px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 56px; }
    .nav-logo { color: #fff; font-weight: 900; font-size: clamp(.85rem,2.5vw,1.05rem); text-decoration: none; letter-spacing: .05em; text-transform: uppercase; }
    .nav-links { display: flex; gap: 4px; }
    .nav-link { color: rgba(255,255,255,.8); text-decoration: none; padding: 7px 13px; border-radius: 8px; font-size: .85rem; font-weight: 600; transition: background .2s; }
    .nav-link:hover, .nav-link.activa { background: rgba(255,255,255,.2); color: #fff; }
    .nav-burger { display: none; background: none; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; padding: 4px 8px; }
    @media (max-width: 620px) {
      .nav-links { display: none; position: absolute; top: 56px; left: 0; right: 0; background: var(--azul); flex-direction: column; padding: 8px; z-index: 99; box-shadow: 0 4px 20px rgba(0,0,0,.5); }
      .nav-links.open { display: flex; }
      .nav-burger { display: block; }
    }

    .contenido { max-width: 700px; margin: 0 auto; padding: 32px 16px 80px; }
    .page-title { font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 900; margin-bottom: 32px; }

    .seccion-titulo { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: rgba(255,255,255,.4); margin: 28px 0 14px; }
    .seccion-titulo:first-of-type { margin-top: 0; }

    .evento-card { background: #1a1a2e; border: 1px solid rgba(255,255,255,.08); border-radius: 16px; padding: 20px; margin-bottom: 14px; display: flex; gap: 18px; }
    .evento-fecha-box { flex-shrink: 0; text-align: center; background: var(--azul); border-radius: 12px; padding: 10px 14px; min-width: 58px; }
    .evento-dia { font-size: 1.6rem; font-weight: 900; line-height: 1; }
    .evento-mes { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; opacity: .85; }
    .evento-anyo { font-size: .65rem; opacity: .7; margin-top: 2px; }
    .evento-body { flex: 1; min-width: 0; }
    .evento-titulo { font-size: 1rem; font-weight: 800; margin-bottom: 6px; }
    .evento-lugar { font-size: .8rem; color: rgba(255,255,255,.5); margin-bottom: 6px; }
    .evento-lugar::before { content: '📍 '; }
    .evento-desc { font-size: .88rem; color: rgba(255,255,255,.7); line-height: 1.5; white-space: pre-wrap; }

    .evento-card.pasado { opacity: .6; }
    .evento-card.pasado .evento-fecha-box { background: rgba(255,255,255,.12); }

    .vacio { color: rgba(255,255,255,.3); font-size: .88rem; padding: 8px 0 20px; }
    .cargando { text-align: center; color: rgba(255,255,255,.3); padding: 60px 20px; font-size: .9rem; }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Peña el Revuelto</a>
      <div class="nav-links" id="nav-links">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="fotos.html" class="nav-link">Fotos</a>
        <a href="noticias.html" class="nav-link">Noticias</a>
        <a href="junta.html" class="nav-link">La Junta</a>
        <a href="eventos.html" class="nav-link activa">Eventos</a>
        <a href="conocenos.html" class="nav-link">Conócenos</a>
        <a href="haztesocio.html" class="nav-link">Hazte Socio</a>
        <a href="sugerencias.html" class="nav-link">Sugerencias</a>
      </div>
      <button class="nav-burger" onclick="document.getElementById('nav-links').classList.toggle('open')">☰</button>
    </div>
  </nav>

  <div class="contenido">
    <h1 class="page-title">📅 Eventos</h1>
    <div id="lista" class="cargando">Cargando...</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDZcYJVrjtcDewG1JOBuWlirirGAJzqkRE",
      authDomain: "fotosfiestas-4609c.firebaseapp.com",
      databaseURL: "https://fotosfiestas-4609c-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "fotosfiestas-4609c",
      storageBucket: "fotosfiestas-4609c.firebasestorage.app",
      messagingSenderId: "204866897359",
      appId: "1:204866897359:web:f8c1cc6a309eb2c2923eba"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

    function renderEvento(e, pasado) {
      const d = new Date(e.fecha);
      const div = document.createElement('div');
      div.className = 'evento-card' + (pasado ? ' pasado' : '');
      div.innerHTML = `
        <div class="evento-fecha-box">
          <div class="evento-dia">${d.getDate()}</div>
          <div class="evento-mes">${MESES[d.getMonth()]}</div>
          <div class="evento-anyo">${d.getFullYear()}</div>
        </div>
        <div class="evento-body">
          <div class="evento-titulo">${esc(e.titulo)}</div>
          ${e.lugar ? `<div class="evento-lugar">${esc(e.lugar)}</div>` : ''}
          ${e.descripcion ? `<div class="evento-desc">${esc(e.descripcion)}</div>` : ''}
        </div>`;
      return div;
    }

    db.ref('eventos').on('value', snap => {
      const lista = document.getElementById('lista');
      lista.innerHTML = '';

      const hoy = Date.now();
      const proximos = [];
      const pasados = [];

      if (snap.exists()) {
        snap.forEach(c => {
          const ev = { id: c.key, ...c.val() };
          if (ev.fecha >= hoy) proximos.push(ev);
          else pasados.push(ev);
        });
      }

      proximos.sort((a, b) => a.fecha - b.fecha);
      pasados.sort((a, b) => b.fecha - a.fecha);

      const t1 = document.createElement('div');
      t1.className = 'seccion-titulo';
      t1.textContent = 'Próximos eventos';
      lista.appendChild(t1);

      if (proximos.length) {
        proximos.forEach(e => lista.appendChild(renderEvento(e, false)));
      } else {
        const v = document.createElement('div');
        v.className = 'vacio';
        v.textContent = 'No hay eventos próximos.';
        lista.appendChild(v);
      }

      const t2 = document.createElement('div');
      t2.className = 'seccion-titulo';
      t2.textContent = 'Eventos pasados';
      lista.appendChild(t2);

      if (pasados.length) {
        pasados.forEach(e => lista.appendChild(renderEvento(e, true)));
      } else {
        const v = document.createElement('div');
        v.className = 'vacio';
        v.textContent = 'No hay eventos pasados.';
        lista.appendChild(v);
      }
    });
  </script>
</body>
</html>
