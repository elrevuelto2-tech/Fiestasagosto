<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peña el Revuelto — Villanueva de Gállego</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0047ab" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Peña Revuelto" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --azul: #0047ab; --radio: 14px; }
    html { scroll-behavior: smooth; }
    body { min-height: 100dvh; font-family: system-ui, -apple-system, sans-serif; background: #0a0a1a; color: #fff; overflow-x: hidden; }

    .nav { position: sticky; top: 0; z-index: 100; background: var(--azul); box-shadow: 0 2px 20px rgba(0,0,0,.5); }
    .nav-inner { max-width: 1000px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 56px; }
    .nav-logo { color: #fff; font-weight: 900; font-size: clamp(.85rem,2.5vw,1.05rem); text-decoration: none; letter-spacing: .05em; text-transform: uppercase; }
    .nav-links { display: flex; gap: 4px; }
    .nav-link { color: rgba(255,255,255,.8); text-decoration: none; padding: 7px 13px; border-radius: 8px; font-size: .85rem; font-weight: 600; transition: background .2s; }
    .nav-link:hover, .nav-link.activa { background: rgba(255,255,255,.2); color: #fff; }
    .nav-burger { display: none; background: none; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; padding: 4px 8px; }
    @media (max-width: 620px) {
      .nav-links { display: none; position: absolute; top: 56px; left: 0; right: 0; background: var(--azul); flex-direction: column; padding: 8px; z-index: 99; box-shadow: 0 4px 20px rgba(0,0,0,.5); }
      .nav-links.open { display: flex; }
      .nav-burger { display: block; }
    }

    .hero {
      position: relative; height: calc(100dvh - 56px); min-height: 400px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background-image: url('https://raw.githubusercontent.com/elrevuelto2-tech/Fiestasagosto/main/Foto-grupo.jpeg');
      background-size: cover; background-position: center;
    }
    .hero-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.85) 0%, rgba(0,0,0,.2) 60%, rgba(0,0,0,.1) 100%);
    }
    .hero-content {
      position: relative; z-index: 2; text-align: center; padding: 0 20px;
    }
    .hero-title {
      font-size: clamp(2rem, 8vw, 4.5rem); font-weight: 900;
      text-transform: uppercase; letter-spacing: .08em;
      color: #fff; text-shadow: 0 2px 24px rgba(0,0,0,.8);
      line-height: 1.1;
    }
    .hero-sub {
      margin-top: 12px; font-size: clamp(.9rem, 2.5vw, 1.3rem);
      color: rgba(255,255,255,.8); letter-spacing: .1em;
      text-transform: uppercase; text-shadow: 0 1px 10px rgba(0,0,0,.7);
    }
    .hero-arrow {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      z-index: 2; color: rgba(255,255,255,.5); font-size: 1.8rem;
      animation: bounce 2s infinite;
    }
    @keyframes bounce { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(8px); } }

    .secciones { max-width: 900px; margin: 0 auto; padding: 48px 16px 80px; }
    .secciones-titulo { text-align: center; font-size: 1.1rem; font-weight: 700; color: rgba(255,255,255,.5); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 32px; }
    .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    @media (min-width: 600px) { .cards-grid { grid-template-columns: repeat(4, 1fr); } }

    .seccion-card {
      background: #1a1a2e; border: 1px solid rgba(255,255,255,.08); border-radius: 16px;
      padding: 28px 16px; text-align: center; text-decoration: none; color: #fff;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      transition: transform .2s, border-color .2s, background .2s;
    }
    .seccion-card:hover { transform: translateY(-4px); border-color: var(--azul); background: rgba(0,71,171,.15); }
    .seccion-card .icono { font-size: 2.4rem; }
    .seccion-card .nombre { font-size: .95rem; font-weight: 700; letter-spacing: .03em; }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Peña el Revuelto</a>
      <div class="nav-links" id="nav-links">
        <a href="index.html" class="nav-link activa">Inicio</a>
        <a href="fotos.html" class="nav-link">Fotos</a>
        <a href="noticias.html" class="nav-link">Noticias</a>
        <a href="junta.html" class="nav-link">La Junta</a>
        <a href="eventos.html" class="nav-link">Eventos</a>
      </div>
      <button class="nav-burger" onclick="document.getElementById('nav-links').classList.toggle('open')">☰</button>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-gradient"></div>
    <div class="hero-content">
      <h1 class="hero-title">Peña el Revuelto</h1>
      <p class="hero-sub">Villanueva de Gállego</p>
    </div>
    <div class="hero-arrow">↓</div>
  </section>

  <section class="secciones">
    <p class="secciones-titulo">Descubre la peña</p>
    <div class="cards-grid">
      <a href="fotos.html" class="seccion-card">
        <span class="icono">📸</span>
        <span class="nombre">Fotos</span>
      </a>
      <a href="noticias.html" class="seccion-card">
        <span class="icono">📰</span>
        <span class="nombre">Noticias</span>
      </a>
      <a href="junta.html" class="seccion-card">
        <span class="icono">👥</span>
        <span class="nombre">La Junta</span>
      </a>
      <a href="eventos.html" class="seccion-card">
        <span class="icono">📅</span>
        <span class="nombre">Eventos</span>
      </a>
    </div>
  </section>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
