<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peña el Revuelto — Villanueva de Gállego</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0047ab" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Peña Revuelto" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --azul: #0047ab; }
    body { min-height: 100dvh; font-family: system-ui, -apple-system, sans-serif; background: #0a0a1a; color: #fff; overflow-x: hidden; }

    /* Nav */
    .nav { position: sticky; top: 0; z-index: 50; background: var(--azul); box-shadow: 0 2px 20px rgba(0,0,0,.5); }
    .nav-inner { max-width: 1000px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 56px; }
    .nav-logo { color: #fff; font-weight: 900; font-size: clamp(.85rem,2.5vw,1.05rem); text-decoration: none; letter-spacing: .05em; text-transform: uppercase; }
    .nav-links { display: flex; gap: 4px; }
    .nav-link { color: rgba(255,255,255,.8); text-decoration: none; padding: 7px 13px; border-radius: 8px; font-size: .85rem; font-weight: 600; transition: background .2s; }
    .nav-link:hover, .nav-link.activa { background: rgba(255,255,255,.2); color: #fff; }
    .nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .btn-header { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: #fff; border-radius: 8px; padding: 7px 12px; font-size: 0.75rem; cursor: pointer; white-space: nowrap; transition: background 0.2s; text-decoration: none; }
    .btn-header:hover { background: rgba(255,255,255,.25); }
    .nav-burger { display: none; background: none; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; padding: 4px 8px; }
    @media (max-width: 620px) {
      .nav-links { display: none; position: absolute; top: 56px; left: 0; right: 0; background: var(--azul); flex-direction: column; padding: 8px; z-index: 99; box-shadow: 0 4px 20px rgba(0,0,0,.5); }
      .nav-links.open { display: flex; }
      .nav-burger { display: block; }
    }

    /* Hero */
    .hero { position: relative; }
    .hero-img { width: 100%; display: block; height: auto; }
    .hero-caption { background: var(--azul); padding: 18px 24px; }
    .hero-titulo {
      font-size: clamp(1.4rem, 4vw, 2.4rem); font-weight: 900;
      letter-spacing: .06em; text-transform: uppercase; line-height: 1.1;
    }
    .hero-sub {
      margin-top: 4px; font-size: clamp(.8rem, 2vw, 1rem);
      color: rgba(255,255,255,.75);
    }

    /* Cuenta atrás */
    #countdown-wrap { background: #1a1a2e; border-bottom: 1px solid rgba(255,255,255,.06); }
    #countdown-inner { max-width: 900px; margin: 0 auto; padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    #countdown-inner.oculto { display: none; }
    .cd-evento { min-width: 0; }
    .cd-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: rgba(255,255,255,.4); margin-bottom: 2px; }
    .cd-titulo { font-size: 1rem; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; }
    .cd-unidades { display: flex; gap: 10px; flex-shrink: 0; }
    .cd-bloque { text-align: center; background: var(--azul); border-radius: 10px; padding: 8px 12px; min-width: 52px; }
    .cd-num { font-size: 1.5rem; font-weight: 900; line-height: 1; font-variant-numeric: tabular-nums; }
    .cd-unit { font-size: .6rem; text-transform: uppercase; letter-spacing: .07em; opacity: .75; margin-top: 2px; }
    @media (max-width: 480px) {
      .cd-bloque { min-width: 42px; padding: 6px 8px; }
      .cd-num { font-size: 1.2rem; }
    }

    /* Cumpleaños notif */
    #birthday-notif { display: none; background: var(--azul); border-bottom: 1px solid rgba(255,255,255,.15); }
    #birthday-notif-inner { max-width: 900px; margin: 0 auto; padding: 14px 24px; font-size: .9rem; font-weight: 600; }

    /* Secciones */
    .secciones { max-width: 900px; margin: 0 auto; padding: 28px 16px 80px; }
    .secciones-titulo { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: rgba(255,255,255,.35); margin-bottom: 14px; }
    .secciones-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }

    .seccion-card {
      background: #1a1a2e; border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px; padding: 18px 20px;
      text-decoration: none; color: #fff;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      transition: border-color .2s, background .2s;
    }
    .seccion-card:hover { border-color: var(--azul); background: rgba(0,71,171,.12); }
    .seccion-card-nombre { font-weight: 700; font-size: .95rem; }
    .seccion-card-arrow { color: rgba(255,255,255,.3); font-size: 1rem; flex-shrink: 0; }
  </style>
</head>
<body>

  <script src="nav.js"></script>

  <div class="hero">
    <img class="hero-img" src="https://raw.githubusercontent.com/elrevuelto2-tech/Fiestasagosto/main/Foto-grupo.jpeg" alt="Peña el Revuelto" />
    <div class="hero-caption">
      <div class="hero-titulo">Peña el Revuelto</div>
      <div class="hero-sub">Villanueva de Gállego</div>
    </div>
  </div>

  <div id="countdown-wrap">
    <div id="countdown-inner" class="oculto">
      <div class="cd-evento">
        <div class="cd-label">Próximo evento</div>
        <div class="cd-titulo" id="cd-titulo"></div>
      </div>
      <div class="cd-unidades">
        <div class="cd-bloque"><div class="cd-num" id="cd-d">--</div><div class="cd-unit">días</div></div>
        <div class="cd-bloque"><div class="cd-num" id="cd-h">--</div><div class="cd-unit">horas</div></div>
        <div class="cd-bloque"><div class="cd-num" id="cd-m">--</div><div class="cd-unit">min</div></div>
        <div class="cd-bloque"><div class="cd-num" id="cd-s">--</div><div class="cd-unit">seg</div></div>
      </div>
    </div>
  </div>

  <div id="birthday-notif">
    <div id="birthday-notif-inner"></div>
  </div>

  <div class="secciones">
    <div class="secciones-titulo">Secciones</div>
    <div class="secciones-grid">
      <a href="fotos.html"       class="seccion-card"><span class="seccion-card-nombre">Fotos</span><span class="seccion-card-arrow">→</span></a>
      <a href="noticias.html"    class="seccion-card"><span class="seccion-card-nombre">Noticias</span><span class="seccion-card-arrow">→</span></a>
      <a href="junta.html"       class="seccion-card"><span class="seccion-card-nombre">La Junta</span><span class="seccion-card-arrow">→</span></a>
      <a href="eventos.html"     class="seccion-card"><span class="seccion-card-nombre">Eventos</span><span class="seccion-card-arrow">→</span></a>
      <a href="conocenos.html"   class="seccion-card"><span class="seccion-card-nombre">Conócenos</span><span class="seccion-card-arrow">→</span></a>
      <a href="haztesocio.html"  class="seccion-card"><span class="seccion-card-nombre">Hazte Socio</span><span class="seccion-card-arrow">→</span></a>
      <a href="sugerencias.html" class="seccion-card"><span class="seccion-card-nombre">Sugerencias</span><span class="seccion-card-arrow">→</span></a>
      <a href="juegos.html"      class="seccion-card"><span class="seccion-card-nombre">Snake</span><span class="seccion-card-arrow">→</span></a>
      <a href="cumpleanos.html"  class="seccion-card"><span class="seccion-card-nombre">Cumpleaños</span><span class="seccion-card-arrow">→</span></a>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyDZcYJVrjtcDewG1JOBuWlirirGAJzqkRE",
      authDomain: "fotosfiestas-4609c.firebaseapp.com",
      databaseURL: "https://fotosfiestas-4609c-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "fotosfiestas-4609c",
      storageBucket: "fotosfiestas-4609c.firebasestorage.app",
      messagingSenderId: "204866897359",
      appId: "1:204866897359:web:f8c1cc6a309eb2c2923eba"
    });
    const db = firebase.database();

    let cdTarget = null, cdTimer = null;

    function pad(n) { return String(n).padStart(2, '0'); }

    function tickCd() {
      if (!cdTarget) return;
      const diff = cdTarget - Date.now();
      if (diff <= 0) { document.getElementById('countdown-inner').classList.add('oculto'); return; }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById('cd-d').textContent = d;
      document.getElementById('cd-h').textContent = pad(h);
      document.getElementById('cd-m').textContent = pad(m);
      document.getElementById('cd-s').textContent = pad(s);
    }

    db.ref('eventos').once('value', snap => {
      if (!snap.exists()) return;
      const ahora = Date.now();
      let proximo = null;
      snap.forEach(c => {
        const ev = c.val();
        if (ev.fecha > ahora && (!proximo || ev.fecha < proximo.fecha)) proximo = ev;
      });
      if (!proximo) return;
      cdTarget = proximo.fecha;
      document.getElementById('cd-titulo').textContent = proximo.titulo;
      document.getElementById('countdown-inner').classList.remove('oculto');
      tickCd();
      cdTimer = setInterval(tickCd, 1000);
    });

    db.ref('cumpleanos').once('value', snap => {
      if (!snap.exists()) return;
      const hoy = new Date();
      const diaHoy = hoy.getDate();
      const mesHoy = hoy.getMonth() + 1;
      const cumpleaneros = [];
      snap.forEach(c => {
        const v = c.val();
        if (v.dia === diaHoy && v.mes === mesHoy) cumpleaneros.push(v.nombre);
      });
      if (cumpleaneros.length === 0) return;
      const notif = document.getElementById('birthday-notif');
      const inner = document.getElementById('birthday-notif-inner');
      inner.textContent = '🎂 Hoy es el cumpleaños de ' + cumpleaneros.join(', ') + '!';
      notif.style.display = 'block';
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
  </script>
</body>
</html>
